<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan Array & Object</title>
</head>
<body>
    <h1>Latihan Array & Object JavaScript</h1>

    <script>
        // ARRAY - kumpulan data
        let buah = ["apel", "mangga", "jeruk"];
        console.log(buah[0]); // apel

        // OBJECT - data dengan nama properti
        let siswa = {
            nama: "Kamu",
            umur: 20,
            kota: "Jakarta"
        };
        console.log(siswa.nama); // Kamu
    </script>
</body>
</html>
